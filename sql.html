<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQLi Framework Reference Dashboard</title>
    <style>
        /* --- CSS STYLING & INTUITIVE DARK PALETTE --- */
        :root {
            --bg-main: #0d1117;
            --bg-card: #161b22;
            --border-color: #30363d;
            --text-primary: #c9d1d9;
            --text-heading: #f0f6fc;
            --accent-blue: #58a6ff;
            --accent-red: #ff7b72;
            --accent-green: #56d364;
            --syntax-bg: #090c10;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            padding: 2rem;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header UI */
        .dashboard-header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .dashboard-title {
            color: var(--text-heading);
            font-size: 1.8rem;
            font-weight: 600;
        }

        .meta-tags {
            margin-top: 0.5rem;
            display: flex;
            gap: 1rem;
            font-size: 0.85rem;
        }

        .tag {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
        }

        /* Search & Filter Controls */
        .controls-panel {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .search-bar {
            flex: 1;
            min-width: 250px;
            background-color: var(--syntax-bg);
            border: 1px solid var(--border-color);
            padding: 0.6rem 1rem;
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
        }

        .search-bar:focus {
            border-color: var(--accent-blue);
        }

        /* Dynamic Table Layout */
        .table-container {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.9rem;
        }

        th {
            background-color: #1f242c;
            color: var(--text-heading);
            font-weight: 600;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            vertical-align: top;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }

        /* Column Configuration widths */
        .col-id { width: 60px; color: var(--accent-blue); font-weight: bold; }
        .col-cat { width: 140px; }
        .col-payload { width: 380px; }
        
        /* Badges based on Categories */
        .badge {
            display: inline-block;
            padding: 0.1rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
        }

        .badge-auth { background: rgba(88, 166, 255, 0.1); color: var(--accent-blue); border: 1px solid rgba(88, 166, 255, 0.2); }
        .badge-error { background: rgba(255, 123, 114, 0.1); color: var(--accent-red); border: 1px solid rgba(255, 123, 114, 0.2); }
        .badge-union { background: rgba(86, 211, 100, 0.1); color: var(--accent-green); border: 1px solid rgba(86, 211, 100, 0.2); }
        .badge-default { background: rgba(255, 255, 255, 0.1); color: var(--text-primary); border: 1px solid var(--border-color); }

        /* Codeblock Presentation layer */
        code {
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, monospace;
            background-color: var(--syntax-bg);
            padding: 0.4rem 0.7rem;
            border-radius: 6px;
            color: #ff7b72;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: block;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .desc-text {
            color: #8b949e;
            font-size: 0.85rem;
        }

        .error-message {
            padding: 2rem;
            text-align: center;
            color: var(--accent-red);
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="dashboard-header">
            <div>
                <h1 class="dashboard-title" id="docTitle">Framework Reference Dashboard</h1>
                <div class="meta-tags">
                    <span class="tag"><strong>Version:</strong> <span id="docVersion">-</span></span>
                    <span class="tag"><strong>Total Metrics:</strong> <span id="docTotal">-</span></span>
                </div>
            </div>
        </header>

        <div class="controls-panel">
            <input type="text" id="searchInp" class="search-bar" placeholder="Search parameters, syntax categories, or descriptions...">
        </div>

        <main class="table-container">
            <table>
                <thead>
                    <tr>
                        <th class="col-id">ID</th>
                        <th class="col-cat">Category</th>
                        <th class="col-payload">Syntax Structure</th>
                        <th>Analytical Framework Description</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="4" style="text-align: center; padding: 2rem;">Loading JSON Data matrix...</td>
                    </tr>
                </tbody>
            </table>
        </main>
    </div>

    <script>
        let payloadData = [];

        // Asynchronous Fetch request sequence
        async function loadPayloads() {
            const tableBody = document.getElementById('tableBody');
            try {
                // payload.json file se data download karne ke liye pipeline
                const response = await fetch('payload.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                
                // Header details global parsing
                document.getElementById('docTitle').innerText = data.title || "SQL Injection Reference Matrix";
                document.getElementById('docVersion').innerText = data.version || "N/A";
                document.getElementById('docTotal').innerText = data.total_payloads || data.cheat_sheet.length;
                
                payloadData = data.cheat_sheet;
                renderTable(payloadData);

            } catch (error) {
                console.error("Data pipeline broken:", error);
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="4" class="error-message">
                            <strong>Data Load Error:</strong> Unable to process payload.json file context. Ensure file is located in the root directory and hosted via local server environment.
                        </td>
                    </tr>`;
            }
        }

        // Helper definition mapping configuration values to CSS badges
        function getCategoryBadgeClass(category) {
            const cat = category.toLowerCase();
            if (cat.includes('auth')) return 'badge-auth';
            if (cat.includes('error')) return 'badge-error';
            if (cat.includes('union')) return 'badge-union';
            return 'badge-default';
        }

        // Execution engine layer responsible for building DOM nodes smoothly
        function renderTable(dataset) {
            const tableBody = document.getElementById('tableBody');
            if (dataset.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="4" style="text-align: center; padding: 2rem; color: #8b949e;">No syntax structures match your search queries.</td></tr>`;
                return;
            }

            tableBody.innerHTML = dataset.map(item => `
                <tr>
                    <td class="col-id">${item.id}</td>
                    <td class="col-cat"><span class="badge ${getCategoryBadgeClass(item.category)}">${item.category}</span></td>
                    <td class="col-payload"><code>${escapeHTML(item.payload)}</code></td>
                    <td class="desc-text">${escapeHTML(item.description)}</td>
                </tr>
            `).join('');
        }

        // Security Utility: XSS payload reflection processing safe string conversion
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        // Input monitoring query selector logic engine
        document.getElementById('searchInp').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = payloadData.filter(item => 
                item.category.toLowerCase().includes(query) || 
                item.payload.toLowerCase().includes(query) || 
                item.description.toLowerCase().includes(query)
            );
            renderTable(filtered);
        });

        // Initialize Engine
        window.addEventListener('DOMContentLoaded', loadPayloads);
    </script>
</body>
</html>
