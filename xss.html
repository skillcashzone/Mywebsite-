<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Code Control Panel</title>
    <style>
        /* --- DESIGN FRAMEWORK --- */
        :root {
            --bg-main: #0d1117;
            --bg-card: #161b22;
            --border-muted: #30363d;
            --text-main: #c9d1d9;
            --text-bright: #f0f6fc;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --syntax-bg: #090c10;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 1.5rem 1rem;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-muted);
            padding-bottom: 1rem;
        }

        h1 {
            color: var(--text-bright);
            font-size: 1.5rem;
            font-weight: 600;
        }

        .meta-info {
            font-size: 0.85rem;
            color: #8b949e;
            margin-top: 0.25rem;
        }

        /* --- CONTROL UTILITIES --- */
        .search-box {
            width: 100%;
            background-color: var(--syntax-bg);
            border: 1px solid var(--border-muted);
            padding: 0.75rem 1rem;
            border-radius: 6px;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            margin-bottom: 1.5rem;
            transition: border-color 0.2s;
        }

        .search-box:focus {
            border-color: var(--accent-blue);
        }

        /* --- DATA GRID LAYOUT --- */
        .grid-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .data-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-muted);
            border-radius: 8px;
            padding: 1rem;
            display: grid;
            grid-template-columns: 60px 180px 1fr;
            gap: 1rem;
            align-items: start;
        }

        .card-id {
            font-weight: bold;
            color: var(--accent-blue);
            font-size: 1.1rem;
        }

        .card-cat {
            font-size: 0.85rem;
            font-weight: 600;
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent-blue);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            border: 1px solid rgba(88, 166, 255, 0.2);
            text-align: center;
            align-self: start;
        }

        .card-content {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        /* --- CODE & COPY COMPONENT --- */
        .code-block-wrapper {
            position: relative;
            background-color: var(--syntax-bg);
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        code {
            font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
            padding: 1rem 3.5rem 1rem 1rem;
            color: #ff7b72;
            display: block;
            white-space: pre-wrap;
            word-break: break-all;
            font-size: 0.9rem;
        }

        .copy-btn {
            position: absolute;
            top: 50%;
            right: 0.75rem;
            transform: translateY(-50%);
            background-color: #21262d;
            border: 1px solid var(--border-muted);
            color: var(--text-main);
            padding: 0.4rem 0.6rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: all 0.15s ease;
        }

        .copy-btn:hover {
            background-color: #30363d;
            border-color: #8b949e;
            color: var(--text-bright);
        }

        .copy-btn.success {
            background-color: rgba(56, 185, 80, 0.15);
            border-color: var(--accent-green);
            color: var(--accent-green);
        }

        .description-text {
            font-size: 0.9rem;
            color: #8b949e;
            line-height: 1.4;
        }

        .status-message {
            text-align: center;
            padding: 3rem;
            color: #8b949e;
        }

        /* --- MOBILE RESPONSIVE ENGINE --- */
        @media (max-width: 768px) {
            .data-card {
                grid-template-columns: 1fr;
                gap: 0.5rem;
                padding: 1rem;
            }
            
            .card-id {
                border-bottom: 1px solid var(--border-muted);
                padding-bottom: 0.25rem;
            }

            .card-cat {
                display: inline-block;
                width: auto;
            }
            
            code {
                padding: 1rem 1rem 3rem 1rem;
            }

            .copy-btn {
                top: auto;
                bottom: 0.5rem;
                right: 0.5rem;
                transform: none;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Framework Dashboard</h1>
            <div class="meta-info" id="countLabel">Loading elements...</div>
        </header>

        <input type="text" id="searchInput" class="search-box" placeholder="Category, syntax ya hindi description se filter karein...">

        <main class="grid-container" id="displayGrid">
            <div class="status-message">Data array stream processing open...</div>
        </main>
    </div>

    <script>
        let dataRecords = [];

        // Fetch local database payload logic
        async function loadMatrix() {
            const grid = document.getElementById('displayGrid');
            try {
                const response = await fetch('xss.json');
                if (!response.ok) throw new Error("HTTP error: " + response.status);
                
                dataRecords = await response.json();
                document.getElementById('countLabel').innerText = `${dataRecords.length} Active System Nodes Loaded`;
                renderGrid(dataRecords);
            } catch (err) {
                grid.innerHTML = `<div class="status-message" style="color:#ff7b72;"><b>Error:</b> payload.json file nahi mili ya JSON syntax invalid hai.</div>`;
            }
        }

        // Render cards dynamically
        function renderGrid(dataset) {
            const grid = document.getElementById('displayGrid');
            if(dataset.length === 0) {
                grid.innerHTML = `<div class="status-message">Koi data match nahi hua.</div>`;
                return;
            }

            grid.innerHTML = dataset.map(item => `
                <div class="data-card">
                    <div class="card-id">#${item.id}</div>
                    <div class="card-cat">${escapeHTML(item.category)}</div>
                    <div class="card-content">
                        <div class="code-block-wrapper">
                            <code>${escapeHTML(item.payload)}</code>
                            <button class="copy-btn" onclick="copyCode(this, \`${escapeJS(item.payload)}\`)">
                                <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 010 1.5h-1.5a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00$.25-.25v-1.5a.75.75 0 011.5 0v1.5A1.75 1.75 0 0110.25 16h-7.5A1.75 1.75 0 010 14.25v-7.5z"></path><path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0114.25 11h-7.5A1.75 1.75 0 015 9.25v-7.5zm1.75-.25a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00$.25-.25v-7.5a.25.25 0 00-.25-.25h-7.5z"></path></svg>
                                <span>Copy</span>
                            </button>
                        </div>
                        <div class="description-text">${escapeHTML(item.description)}</div>
                    </div>
                </div>
            `).join('');
        }

        // Clip-board clipboard operations engine
        function copyCode(buttonElement, codeString) {
            navigator.clipboard.writeText(codeString).then(() => {
                const textSpan = buttonElement.querySelector('span');
                const svgContainer = buttonElement.querySelector('svg');
                
                buttonElement.classList.add('success');
                textSpan.innerText = 'Copied!';
                svgContainer.innerHTML = '<path d="M13.78 4.22a.75.75 0 010 1.06l-7.25 7.25a.75.75 0 01-1.06 0l-3.5-3.5a.75.75 0 111.06-1.06L6 10.94l6.72-6.72a.75.75 0 011.06 0z"></path>';

                setTimeout(() => {
                    buttonElement.classList.remove('success');
                    textSpan.innerText = 'Copy';
                    svgContainer.innerHTML = '<path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 010 1.5h-1.5a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00$.25-.25v-1.5a.75.75 0 011.5 0v1.5A1.75 1.75 0 0110.25 16h-7.5A1.75 1.75 0 010 14.25v-7.5z"></path><path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0114.25 11h-7.5A1.75 1.75 0 015 9.25v-7.5zm1.75-.25a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00$.25-.25v-7.5a.25.25 0 00-.25-.25h-7.5z"></path>';
                }, 2000);
            });
        }

        // Sanitization Layer
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = dataRecords.filter(item => 
                item.category.toLowerCase().includes(query) || 
                item.payload.toLowerCase().includes(query) || 
                item.description.toLowerCase().includes(query)
            );
            renderGrid(filtered);
        });

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }

        function escapeJS(str) {
            return str.replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/\$/g, '\\$');
        }

        window.addEventListener('DOMContentLoaded', loadMatrix);
    </script>
</body>
</html>
